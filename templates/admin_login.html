<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PsyFind Admin Login - Secure administration panel">
    <title data-lang="page_title">PsyFind Admin Login</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" 
          crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    
    <!-- Page-specific styles -->
    <style>
        .page--login {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-5);
            background: linear-gradient(135deg, var(--color-primary-600) 0%, var(--color-secondary-700) 100%);
        }

        .login-card {
            background: var(--bg-elevated);
            border-radius: var(--radius-3xl);
            box-shadow: var(--shadow-2xl);
            padding: var(--space-10);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-card__icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--color-primary-500) 0%, var(--color-secondary-500) 100%);
            border-radius: var(--radius-2xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-6);
            font-size: var(--text-3xl);
            color: var(--color-white);
        }

        .login-card__title {
            font-size: var(--text-2xl);
            font-weight: var(--font-semibold);
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .login-card__subtitle {
            color: var(--text-muted);
            margin-bottom: var(--space-8);
        }

        .login-form {
            text-align: left;
        }

        .login-form .form-group {
            margin-bottom: var(--space-5);
        }

        .login-form .btn {
            width: 100%;
            margin-top: var(--space-4);
        }

        .login-card__footer {
            margin-top: var(--space-8);
            padding-top: var(--space-6);
            border-top: 1px solid var(--border-light);
        }

        .login-card__back-link {
            color: var(--text-link);
            font-size: var(--text-sm);
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
        }

        .login-card__back-link:hover {
            color: var(--text-link-hover);
        }

        /* Alert for development mode */
        .dev-notice {
            background: var(--color-info-50);
            border: 1px solid var(--color-info-200);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-top: var(--space-6);
            font-size: var(--text-sm);
        }

        .dev-notice__title {
            font-weight: var(--font-semibold);
            color: var(--color-info-700);
            margin-bottom: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .dev-notice__content {
            color: var(--color-info-800);
        }

        .dev-notice__content code {
            background: var(--color-info-100);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
        }

        @media (max-width: 480px) {
            .page--login {
                padding: var(--space-4);
            }

            .login-card {
                padding: var(--space-6);
            }

            .login-card__icon {
                width: 60px;
                height: 60px;
                font-size: var(--text-2xl);
            }
        }
    </style>
</head>
<body class="page--login">
    <main class="login-card">
        <div class="login-card__icon" aria-hidden="true">
            <i class="fas fa-shield-alt"></i>
        </div>
        
        <h1 class="login-card__title" data-lang="admin_login">Admin Login</h1>
        <p class="login-card__subtitle" data-lang="admin_subtitle">PsyFind Administration Panel</p>

        <form class="login-form" id="loginForm" novalidate>
            <div class="alert alert--error" id="errorMessage" role="alert" style="display: none;">
                <i class="fas fa-exclamation-circle alert__icon" aria-hidden="true"></i>
                <div class="alert__content">
                    <p class="alert__message" id="errorText"></p>
                </div>
            </div>

            <div class="form-group">
                <label for="username" class="form-group__label form-group__label--required" data-lang="username">
                    Username
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-input form-input--lg"
                    required
                    autocomplete="username"
                    aria-required="true"
                    data-lang-placeholder="enter_username"
                    placeholder="Enter your username"
                >
            </div>

            <div class="form-group">
                <label for="password" class="form-group__label form-group__label--required" data-lang="password">
                    Password
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input form-input--lg"
                    required
                    autocomplete="current-password"
                    aria-required="true"
                    data-lang-placeholder="enter_password"
                    placeholder="Enter your password"
                >
            </div>

            <button type="submit" class="btn btn--primary btn--lg" id="loginBtn">
                <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
                <span data-lang="sign_in">Sign In</span>
            </button>
        </form>

        <div class="dev-notice">
            <div class="dev-notice__title">
                <i class="fas fa-info-circle" aria-hidden="true"></i>
                <span data-lang="default_credentials">Default Credentials</span>
            </div>
            <div class="dev-notice__content">
                <p><strong data-lang="admin">Admin:</strong> <code>admin / admin123</code></p>
                <p><strong data-lang="doctor_user">Doctor:</strong> <code>doctor / doctor123</code></p>
            </div>
        </div>

        <div class="login-card__footer">
            <a href="/" class="login-card__back-link">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
                <span data-lang="back_to_main">Back to PsyFind</span>
            </a>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/utils/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/utils/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/toast.js') }}"></script>
    
    <script>
        // Initialize i18n
        I18n.init('en');

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        // Form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Validation
            if (!username || !password) {
                showError(I18n.t('fill_all_fields') || 'Please fill in all fields');
                return;
            }
            
            // Hide previous errors
            hideError();
            
            // Loading state
            loginBtn.disabled = true;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = `<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> ${I18n.t('signing_in') || 'Signing in...'}`;
            
            try {
                const response = await API.Admin.login(username, password);
                
                if (response.success) {
                    Toast.success(I18n.t('login_success') || 'Login successful');
                    window.location.href = response.redirect || '/admin/dashboard';
                } else {
                    showError(response.error || I18n.t('login_failed') || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError(I18n.t('network_error') || 'Network error. Please try again.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = 'flex';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }
    </script>
</body>
</html>
